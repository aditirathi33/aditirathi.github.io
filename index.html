    function createImageCarousel(container, images, title) {
      const fallback = container.querySelector('.fallback-media');
      let loaded = 0;
      const dots = document.createElement('div');
      dots.className = 'carousel-dots';

      images.forEach((src, index) => {
        const img = document.createElement('img');
        img.src = src;
        img.alt = title + ' image ' + (index + 1);
        img.className = index === 0 ? 'active' : '';
        img.onload = () => { loaded++; if (fallback) fallback.style.display = 'none'; };
        img.onerror = () => { img.remove(); if (loaded === 0 && fallback) fallback.style.display = 'grid'; };
        container.appendChild(img);

        const dot = document.createElement('span');
        dot.className = index === 0 ? 'carousel-dot active' : 'carousel-dot';
        dots.appendChild(dot);
      });

      container.appendChild(dots);
    }

            <div>
              <i class="${icon} text-6xl mb-4"></i>
              <p class="text-2xl font-extrabold">${item.title}</p>
            </div>
          </div>
        </div>
        <div class="p-4">
          <p class="section-kicker">${item.kicker}</p>
          <h3 class="text-2xl font-extrabold mt-2">${item.title}</h3>
          <p class="muted mt-3 leading-relaxed">${item.description}</p>
          <button class="btn-secondary mt-5 !py-2 !px-4">View Bigger <i class="fa-solid fa-up-right-and-down-left-from-center"></i></button>
        </div>`;
      achievementTrack.appendChild(article);
      createImageCarousel(article.querySelector('.media-carousel'), item.images, item.title);
    });

    function advanceCarousels() {
      document.querySelectorAll('.media-carousel').forEach((carousel) => {
        const imgs = Array.from(carousel.querySelectorAll('img'));
        const dots = Array.from(carousel.querySelectorAll('.carousel-dot'));
        if (imgs.length <= 1) return;
        const current = Math.max(0, imgs.findIndex(img => img.classList.contains('active')));
        const next = (current + 1) % imgs.length;
        imgs[current]?.classList.remove('active');
        dots[current]?.classList.remove('active');
        imgs[next]?.classList.add('active');
        dots[next]?.classList.add('active');
      });
    }

    setInterval(advanceCarousels, 3300);

    const modal = document.getElementById('detailModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalKicker = document.getElementById('modalKicker');
    const modalDesc = document.getElementById('modalDesc');
    const modalGallery = document.getElementById('modalGallery');
    const modalTags = document.getElementById('modalTags');
    const modalLink = document.getElementById('modalLink');

    function openModal(id) {
      const item = dataItems[id];
      if (!item) return;

      modalKicker.textContent = item.kicker;
      modalTitle.textContent = item.title;
      modalDesc.textContent = item.description;
      modalGallery.innerHTML = item.images.map((src, i) => `
        <img src="${src}" alt="${item.title} ${i + 1}" class="image-natural glass" onerror="this.style.display='none'">
      `).join('');
      modalTags.innerHTML = item.tags.map(tag => `<span class="tag">${tag}</span>`).join('');

      if (item.link) {
        modalLink.href = item.link;
        modalLink.classList.remove('hidden');
      } else {
        modalLink.classList.add('hidden');
      }

      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    document.addEventListener('click', (e) => {
      const trigger = e.target.closest('[data-open-modal]');
      if (trigger) openModal(trigger.dataset.openModal);
    });

    document.getElementById('closeModal').addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    function closeModal() {
      modal.classList.remove('open');
      document.body.style.overflow = '';
    }

    const portraitSlides = Array.from(document.querySelectorAll('.portrait-slide'));
    let portraitIndex = 0;

    setInterval(() => {
      if (portraitSlides.length <= 1) return;
      portraitSlides[portraitIndex].classList.remove('active');
      portraitIndex = (portraitIndex + 1) % portraitSlides.length;
      portraitSlides[portraitIndex].classList.add('active');
    }, 3800);

    document.getElementById('prevAchievement').addEventListener('click', () => achievementTrack.scrollBy({ left: -440, behavior: 'smooth' }));
    document.getElementById('nextAchievement').addEventListener('click', () => achievementTrack.scrollBy({ left: 440, behavior: 'smooth' }));

    async function loadGitHubProjects() {
      const box = document.getElementById('githubProjects');
      box.innerHTML = '<div class="glass rounded-3xl p-6 muted">Loading public repositories...</div>';

      try {
        const res = await fetch('https://api.github.com/users/aditirathi33/repos?sort=updated&per_page=6');
        if (!res.ok) throw new Error('GitHub API unavailable');

        const repos = await res.json();
        const filtered = repos.filter(r => !r.fork).slice(0, 6);

        box.innerHTML = filtered.map(repo => `
          <a class="repo-card glass rounded-3xl p-6" href="${repo.html_url}" target="_blank">
            <div class="flex items-start justify-between gap-4">
              <div>
                <h4 class="font-extrabold text-xl">${repo.name}</h4>
                <p class="muted mt-3">${repo.description || 'Public GitHub project by Aditi Rathi.'}</p>
              </div>
              <i class="fab fa-github text-2xl gradient-text"></i>
            </div>
            <div class="flex flex-wrap gap-2 mt-5">
              <span class="tag">${repo.language || 'Code'}</span>
              <span class="tag">★ ${repo.stargazers_count}</span>
              <span class="tag">Updated</span>
            </div>
          </a>
        `).join('') || fallbackRepos();

      } catch (err) {
        box.innerHTML = fallbackRepos();
      }
    }

    function fallbackRepos() {
      return `
        <a class="repo-card glass rounded-3xl p-6" href="https://github.com/aditirathi33" target="_blank">
          <h4 class="font-extrabold text-xl">GitHub Projects</h4>
          <p class="muted mt-3">Could not fetch live repos right now. Visit GitHub to view latest projects.</p>
          <span class="tag mt-5">Open GitHub</span>
        </a>`;
    }

    function extractMediumImage(item) {
      if (item.thumbnail && item.thumbnail.trim()) return item.thumbnail;

      const html = item.content || item.description || '';
      const wrapper = document.createElement('div');
      wrapper.innerHTML = html;

      const img = wrapper.querySelector('img');
      if (img && img.src) return img.src;

      return 'medium-fallback.jpg';
    }

    function stripHtml(html) {
      const wrapper = document.createElement('div');
      wrapper.innerHTML = html || '';
      return (wrapper.textContent || wrapper.innerText || '').trim();
    }

    async function loadLivePosts() {
      const box = document.getElementById('livePosts');
      box.innerHTML = fallbackPosts();

      try {
        const feedUrl = encodeURIComponent('https://medium.com/feed/@aditirathi340');
        const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${feedUrl}`);
        if (!res.ok) throw new Error('Medium feed unavailable');

        const data = await res.json();

        const posts = (data.items || []).slice(0, 2).map(item => {
          const img = extractMediumImage(item);
          const excerpt = stripHtml(item.description || item.content || '').slice(0, 105);

          return `
            <a class="post-card glass rounded-3xl p-4" href="${item.link}" target="_blank">
              <div class="h-44 rounded-2xl overflow-hidden bg-black/20 grid place-items-center">
                <img
                  src="${img}"
                  class="w-full h-full object-cover"
                  alt="${item.title}"
                  referrerpolicy="no-referrer"
                  onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=&quot;text-center p-5&quot;><i class=&quot;fab fa-medium text-4xl gradient-text&quot;></i><p class=&quot;muted mt-3&quot;>Medium Article</p></div>'"
                >
              </div>
              <p class="section-kicker mt-4">Medium</p>
              <h4 class="font-extrabold text-lg mt-2">${item.title}</h4>
              <p class="muted text-sm mt-2">${excerpt}${excerpt.length >= 105 ? '...' : ''}</p>
            </a>`;
        }).join('');

        box.innerHTML = posts + fallbackPosts(false);

      } catch (err) {
        box.innerHTML = fallbackPosts();
      }
    }

    function fallbackPosts(includeMedium = true) {
      const medium = includeMedium ? `
        <a class="post-card glass rounded-3xl p-6" href="https://medium.com/@aditirathi340" target="_blank">
          <i class="fab fa-medium text-3xl gradient-text"></i>
          <p class="section-kicker mt-5">Medium</p>
          <h4 class="font-extrabold text-lg mt-2">Read my latest blogs</h4>
          <p class="muted mt-2">Live feed unavailable, opening profile instead.</p>
        </a>` : '';

      return `${medium}
        <a class="post-card glass rounded-3xl p-6" href="https://instagram.com/okditi" target="_blank">
          <i class="fab fa-instagram text-3xl gradient-text"></i>
          <p class="section-kicker mt-5">Instagram</p>
          <h4 class="font-extrabold text-lg mt-2">Latest visual updates</h4>
          <p class="muted mt-2">Check out my latest Insta posts here</p>
        </a>
        <a class="post-card glass rounded-3xl p-6" href="https://x.com/AditiRathi33" target="_blank">
          <i class="fab fa-x-twitter text-3xl gradient-text"></i>
          <p class="section-kicker mt-5">X</p>
          <h4 class="font-extrabold text-lg mt-2">Latest thoughts</h4>
          <p class="muted mt-2">Check out my latest X posts here</p>
        </a>
        <a class="post-card glass rounded-3xl p-6" href="https://linkedin.com/in/aditirathi33" target="_blank">
          <i class="fab fa-linkedin text-3xl gradient-text"></i>
          <p class="section-kicker mt-5">LinkedIn</p>
          <h4 class="font-extrabold text-lg mt-2">Professional updates</h4>
          <p class="muted mt-2">Check out my latest LinkedIn posts here</p>
        </a>`;
    }

    document.getElementById('refreshLive').addEventListener('click', loadLivePosts);

    loadGitHubProjects();
    loadLivePosts();

    const themeToggle = document.getElementById('themeToggle');
    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('light');
      themeToggle.querySelector('i').className = document.body.classList.contains('light') ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
    });

    const mobileMenu = document.getElementById('mobileMenu');
    document.getElementById('menuToggle').addEventListener('click', () => mobileMenu.classList.toggle('open'));

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('active');
      });
    }, { threshold: .12 });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

    const scrollTop = document.getElementById('scrollTop');
    window.addEventListener('scroll', () => scrollTop.classList.toggle('hidden', window.scrollY < 500));
    scrollTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
  </script>
</body>
</html>
